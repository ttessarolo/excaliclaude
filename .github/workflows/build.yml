name: Build ExcaliClaude

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Build MCP server
        run: npm run build:server

      - name: Build frontend
        run: npm run build:frontend

      - name: Verify dist layout
        run: |
          test -f dist/mcp/index.js || (echo "Missing dist/mcp/index.js" && exit 1)
          test -f dist/canvas-app/server.js || (echo "Missing dist/canvas-app/server.js" && exit 1)
          test -f dist/canvas-app/start-server.js || (echo "Missing dist/canvas-app/start-server.js" && exit 1)
          test -d dist/frontend || (echo "Missing dist/frontend" && exit 1)

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: excaliclaude-dist
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: |
          npm run build:server
          npm run build:frontend

      - name: Create release archive
        run: |
          mkdir -p release/excaliclaude
          cp -r .claude-plugin release/excaliclaude/
          cp -r skills release/excaliclaude/
          cp -r dist release/excaliclaude/
          cp .mcp.json release/excaliclaude/
          cp package.json release/excaliclaude/
          cp README.md release/excaliclaude/
          cp LICENSE release/excaliclaude/
          cd release && zip -r ../excaliclaude-${{ github.ref_name }}.zip excaliclaude/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: excaliclaude-${{ github.ref_name }}.zip
          generate_release_notes: true
